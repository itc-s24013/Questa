<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>新規登録 - Questa</title>
    <style>
        body {
            font-family: sans-serif;
            display: flex;
            justify-content: center;
            padding-top: 50px;
        }

        .card {
            border: 1px solid #ccc;
            padding: 20px;
            border-radius: 8px;
            width: 300px;
        }

        input {
            width: 100%;
            margin-bottom: 10px;
            padding: 8px;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 10px;
            background: #33ec9c;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

        .msg {
            margin-top: 10px;
            font-size: 0.9em;
            color: red;
        }
    </style>
</head>
<body>
<div class="card">
    <h2>新規登録</h2>
    <input type="email" id="email" placeholder="メールアドレス" required>
    <input type="password" id="password" placeholder="パスワード" required>
    <input type="text" id="name" placeholder="ユーザー名" required>
    <button onclick="handleSignup()">登録する</button>
    <div id="message" class="msg"></div>
</div>
<div>
    <button onclick="location.href='/'">戻る</button>
</div>

<script>
    async function handleSignup() {
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const name = document.getElementById('name').value;
        const msgDiv = document.getElementById('message');

        const res = await fetch('/auth/signup', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({email, password, name})
        });

        const result = await res.json();
        if (res.ok) {
            alert("メールを確認して、届いた8桁の数字を入力してください");
            // 成功したらOTP入力画面へ遷移（または表示切替）
            window.location.href = `/auth/verify?email=${encodeURIComponent(email)}`;
        } else {
            msgDiv.innerText = result.error || "signup.htmlでエラーが発生しました";
        }
    }
</script>
</body>
</html>
