<div class="card">
    <h2>OTPを確認</h2>
    <p>メールに届いた8桁の数字を入力してください</p>
    <input type="hidden" id="verify-email">
    <input type="text" id="otp" placeholder="12345678" maxlength="8" style="text-align: center; font-size: 1.5em;">
    <button onclick="handleVerify()">確認</button>
    <div id="verify-msg" class="msg"></div>
</div>

<script>
    // URLパラメータからemailを取得してセット
    const params = new URLSearchParams(window.location.search);
    document.getElementById('verify-email').value = params.get('email');

    async function handleVerify() {
        const email = document.getElementById('verify-email').value;
        const token = document.getElementById('otp').value;

        const res = await fetch('/auth/verify', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, token })
        });

        const result = await res.json();
        if (res.ok) {
            alert("認証成功！ログインしました");
            window.location.href = "/dashboard"; // ログイン後の画面へ
        } else {
            document.getElementById('verify-msg').innerText = result.error;
        }
    }
</script>
