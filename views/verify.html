<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>新規登録 - Questa</title>
    <script defer src="/js/handle.js"></script>
</head>
<body>
<div class="card">
    <h2>OTPを確認</h2>
    <p>メールに届いた8桁の数字を入力してください</p>
    <input type="hidden" id="verify-email">
    <input type="text" id="otp" placeholder="12345678" maxlength="8" style="text-align: center; font-size: 1.5em;">
    <button data-action="verify" type="button">確認</button>
    <div id="verify-msg" class="msg"></div>
</div>
</body>
</html>
