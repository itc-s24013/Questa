<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>ログイン - Questa</title>
    <script defer src="/js/handle.js"></script>
    <style>
        body {
            font-family: sans-serif;
            display: flex;
            justify-content: center;
            padding-top: 50px;
        }

        .card {
            border: 1px solid #ccc;
            padding: 20px;
            border-radius: 8px;
            width: 300px;
        }

        input {
            width: 100%;
            margin-bottom: 10px;
            padding: 8px;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 10px;
            background: #33ec9c;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

        .msg {
            margin-top: 10px;
            font-size: 0.9em;
            color: red;
        }
    </style>
</head>
<body>
<div class="card">
    <h2>ログイン</h2>
    <input type="email" id="email" placeholder="メールアドレス" required>
    <input type="password" id="password" placeholder="パスワード" required>
    <button data-action="login">確認</button>
    <div id="message" class="msg"></div>
    <div>
        <button data-action="goBack">戻る</button>
    </div>
</div>
</body>
</html>
