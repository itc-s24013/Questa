<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>ログイン - Questa</title>
    <style>
        body {
            font-family: sans-serif;
            display: flex;
            justify-content: center;
            padding-top: 50px;
        }

        .card {
            border: 1px solid #ccc;
            padding: 20px;
            border-radius: 8px;
            width: 300px;
        }

        input {
            width: 100%;
            margin-bottom: 10px;
            padding: 8px;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 10px;
            background: #33ec9c;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

        .msg {
            margin-top: 10px;
            font-size: 0.9em;
            color: red;
        }
    </style>
</head>
<body>
<div class="card">
    <h2>ログイン</h2>
    <input type="email" id="email" placeholder="メールアドレス" required>
    <input type="password" id="password" placeholder="パスワード" required>
    <button onclick="handleSignup()">確認</button>
    <div id="message" class="msg"></div>
</div>
<div>
    <button onclick="location.href='/'">戻る</button>
</div>

<script>
    // javascript
    // 使い方: SUPABASE_SERVICE_ROLE_KEY=... node decode_service_key.js
    const key = process.env.SUPABASE_SERVICE_ROLE_KEY;
    if (!key) {
        console.error('SUPABASE_SERVICE_ROLE_KEY が設定されていません');
        process.exit(1);
    }
    console.log('キープレビュー:', key.slice(0,8) + '... len=' + key.length);

    const parts = key.split('.');
    if (parts.length !== 3) {
        console.error('JWT 形式ではありません');
        process.exit(1);
    }

    const base64urlDecode = s => {
        s = s.replace(/-/g, '+').replace(/_/g, '/');
        while (s.length % 4) s += '=';
        return Buffer.from(s, 'base64').toString('utf8');
    };

    try {
        const header = JSON.parse(base64urlDecode(parts[0]));
        const payload = JSON.parse(base64urlDecode(parts[1]));
        console.log('header:', header);
        console.log('payload:', payload);
        console.log('role claim:', payload.role || '(無し)');
        console.log('is service_role:', payload.role === 'service_role');
    } catch (e) {
        console.error('デコードに失敗しました:', e.message);
        process.exit(1);
    }


    async function handleSignup() {
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const msgDiv = document.getElementById('message');

        const res = await fetch('/auth/login', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({email, password})
        });

        const result = await res.json();
        console.log(result);
        if (res.ok) {
            // 成功したらダッシュボードへ遷移
            window.location.href = `/dashboard?email=${encodeURIComponent(email)}`;
        } else {
            msgDiv.innerText = result.error || "login.htmlでエラーが発生しました";
        }
    }
</script>
</body>
</html>
